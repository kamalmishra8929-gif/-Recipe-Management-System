{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'recipe.css' %}">
</head>
<body>
    <div class="container mt-5">

<form class="col-6 mx-auto card p-3 shadow-lg" style="width: 50%;" method="post" enctype="multipart/form-data">


    {% csrf_token %}


    <h2>Add recipe</h2>

  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Recipe Name</label>
    <input name="recipe_name" required type="text" class="form-control">
  </div>

  <div class="mb-3">
    <label for="exampleInputPassword1"  class="form-label">Recipe Description</label>
   <textarea  class="form-control" name="description" required></textarea>
  </div>

  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Recipe Image</label>
    <input name="image"  type="file" class="form-control" >
  </div>
 
  <button type="submit" class="btn btn-primary">ADD RECIPE</button>
</form>
<hr>
<div class="mt-5">

     <form method="GET">
    <div class="mb-3">
        <label style="font-weight:700">Search Food</label><br>
        <input name="search" value="{{ request.GET.search }}" type="text" class="form-control" style="width:50%">
    <br>
    </div><br>
<button type="submit" class="up-btn">Search</button>
</form>
</div>
<hr>

<table border="1" cellpadding="10" style="margin-top: 30px;">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Recipe Name</th>
      <th scope="col">Description</th>
      <th scope="col">Image</th>
      <th scope="col">Delete</th>
     
    </tr>
  </thead>

  <tbody>
    {% for items in recipe %}
    <tr>
      <th scope="row">{{forloop.counter}}</th>
      <td>{{items.recipe_name}}</td>
      <td>{{items.description}}</td>
      <td>
    {% if items.image %}
        <img src="{{ items.image.url }}" width="100" alt="{{ items.recipe_name }}">
    {% else %}
        No image
    {% endif %}
    </td>
    <td>
      <a href="/delete/{{ items.id }}/"><button type="submit" class="delete-btn ">Delete</button></a><br><br>
       <a href="/update/{{ items.id }}/"><button type="submit" class="update-btn">UPDATE</button></a>
    </td>
      
    </tr>
    
    {% endfor %} 
    <td>
      <div class="btn-container">
        <a href="/delete_all"><button class="Delete-all-btn">Delete all</button></a>
        </div>
      </td>
  </tbody>
</table>
    </div>
</body>
</html>
